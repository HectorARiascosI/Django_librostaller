{% extends 'gestion/base.html' %}

{% block title %}Formulario de Autor{% endblock %}

{% block content %}
<h1>{% if form.instance.pk %}✏️ Editar Autor{% else %}➕ Crear Nuevo Autor{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">💾 Guardar</button>
    <a href="{% url 'lista_autores' %}" class="btn btn-secondary">❌ Cancelar</a>
</form>
{% endblock %}
