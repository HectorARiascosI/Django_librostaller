<h1>Autores (Vista Genérica)</h1>
<a href="{% url 'autor_create_generic' %}">Agregar Autor</a>
<ul>
{% for autor in autores %}
    <li>{{ autor.nombre }} - {{ autor.correo }}
        <a href="{% url 'autor_update_generic' autor.pk %}">Editar</a>
        <a href="{% url 'autor_delete_generic' autor.pk %}">Eliminar</a>
    </li>
{% endfor %}
</ul>
